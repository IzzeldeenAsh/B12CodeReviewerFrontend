# SPA hosting for the B12 AI Code Reviewer frontend.
#
# Security posture (§18):
#  - A strict Content-Security-Policy: scripts/styles are self-hosted only, and
#    connect-src must be widened to your backend + Entra login endpoints at
#    deploy time (see the connect-src line below).
#  - The app talks ONLY to the backend and Microsoft Entra — never directly to
#    Azure DevOps or Anthropic.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets; never cache the HTML entrypoint.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Adjust connect-src to YOUR backend origin and Entra login endpoints.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://login.microsoftonline.com https://YOUR-BACKEND-ORIGIN; frame-src https://login.microsoftonline.com; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
